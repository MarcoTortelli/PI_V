spring:
  application:
    name: ecommerce-api
  datasource:
    url: jdbc:postgresql://localhost:5432/db
    username: admin
    password: 1234
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    database: postgresql
    database-platform: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration

client:
  card-validator-service:
    url: https://mocki.io/v1/0c888051-e36e-4c62-bdde-188be2ebc4b9

admin:
  password: 123456

api:
  security:
    token:
      secret: ${JWT_SECRET:secret-key}

management:
  endpoints:
    web:
      base-path: /
    jmx:
      exposure:
        exclude: health
